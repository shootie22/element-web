# Fork-only: build the element-web web client as a small nginx container and
# publish it to this repo's GitHub Container Registry (ghcr.io) on every release
# tag. Reuses the upstream apps/web/Dockerfile unchanged. The image ships generic
# upstream defaults; deployers point it at their own homeserver / Element Call at
# runtime via env vars (see apps/web/docker/docker-entrypoint.d/19-fork-config-from-env.sh).
name: Release Container

on:
    push:
        tags:
            - "v*"
    workflow_dispatch: {}

concurrency: ${{ github.workflow }}-${{ github.ref_name }}

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        name: Build & push element-web container
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0 # docker-package needs full history to compute the version
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
              with:
                  install: true

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=ref,event=tag
                      type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') }}

            - name: Build and push
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  file: apps/web/Dockerfile
                  push: true
                  platforms: linux/amd64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
