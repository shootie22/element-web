name: GitHub Release Clients

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build and publish, for example v1.12.21"
                required: true
                type: string

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
    contents: read

env:
    RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    DESKTOP_CONFIG: github-release
    WEBAPP_ARTIFACT: github-release-webapp

jobs:
    web:
        name: Build web
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  ref: ${{ env.RELEASE_REF }}
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: ./scripts/layered.sh

            - name: Build web distribution
              working-directory: apps/web
              run: pnpm run dist
              env:
                  DIST_VERSION: ${{ env.RELEASE_TAG }}
                  CI_PACKAGE: true

            - name: Upload webapp for desktop packaging
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ${{ env.WEBAPP_ARTIFACT }}
                  path: apps/web/webapp
                  retention-days: 1

            - name: Upload web release tarball
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: web-release
                  path: apps/web/dist/*.tar.gz
                  retention-days: 1

    prepare-desktop:
        name: Prepare desktop
        needs: web
        uses: ./.github/workflows/build_desktop_prepare.yaml
        permissions:
            contents: read
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            config: github-release
            version: develop
            webapp-artifact: github-release-webapp
            deploy: false

    linux:
        name: Linux ${{ matrix.arch }}
        needs: prepare-desktop
        strategy:
            fail-fast: false
            matrix:
                arch: [amd64, arm64]
        uses: ./.github/workflows/build_desktop_linux.yaml
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            arch: ${{ matrix.arch }}
            sqlcipher: static
            targets: tar.gz deb
            docker-image-tag: staging

    windows:
        name: Windows ${{ matrix.arch }}
        needs: prepare-desktop
        strategy:
            fail-fast: false
            matrix:
                arch: [x64, arm64]
        uses: ./.github/workflows/build_desktop_windows.yaml
        secrets: inherit # zizmor: ignore[secrets-inherit]
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            arch: ${{ matrix.arch }}
            targets: squirrel msi
            sign: ${{ vars.WINDOWS_SIGN_RELEASES == 'true' && 'true' || '' }}

    publish:
        name: Publish GitHub release assets
        needs:
            - web
            - linux
            - windows
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  path: downloaded

            - name: Collect release assets
              run: |
                  set -euo pipefail

                  mkdir -p release-assets
                  while IFS= read -r -d '' file; do
                      rel=${file#downloaded/}
                      safe=${rel//\//__}
                      cp "$file" "release-assets/$safe"
                  done < <(
                      find downloaded -type f \
                          \( \
                              -name '*.tar.gz' \
                              -o -name '*.deb' \
                              -o -name '*.exe' \
                              -o -name '*.msi' \
                              -o -name '*.nupkg' \
                              -o -name 'RELEASES' \
                          \) \
                          ! -path '*-test/*' \
                          -print0
                  )

                  test "$(find release-assets -type f | wc -l)" -gt 0
                  find release-assets -type f -maxdepth 1 -print | sort

            - name: Create or update GitHub release
              run: |
                  set -euo pipefail

                  if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
                      gh release upload "$RELEASE_TAG" release-assets/* --clobber
                  else
                      gh release create "$RELEASE_TAG" release-assets/* \
                          --target "$GITHUB_SHA" \
                          --title "$RELEASE_TAG" \
                          --notes "Automated web, Linux, and Windows client build for $RELEASE_TAG."
                  fi
              env:
                  GH_TOKEN: ${{ github.token }}
