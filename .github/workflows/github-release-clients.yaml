name: GitHub Release Clients

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build and publish, for example v1.12.21"
                required: true
                type: string

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
    contents: read

env:
    RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    DESKTOP_CONFIG: github-release
    WEBAPP_ARTIFACT: github-release-webapp

jobs:
    web:
        name: Build web
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  ref: ${{ env.RELEASE_REF }}
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Install dependencies
              run: ./scripts/layered.sh

            - name: Build web distribution
              working-directory: apps/web
              run: pnpm run dist
              env:
                  DIST_VERSION: ${{ env.RELEASE_TAG }}
                  CI_PACKAGE: true

            - name: Upload webapp for desktop packaging
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ${{ env.WEBAPP_ARTIFACT }}
                  path: apps/web/webapp
                  retention-days: 1

            - name: Upload web release tarball
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: web-release
                  path: apps/web/dist/*.tar.gz
                  retention-days: 1

    prepare-desktop:
        name: Prepare desktop
        needs: web
        uses: ./.github/workflows/build_desktop_prepare.yaml
        permissions:
            contents: read
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            config: github-release
            version: develop
            webapp-artifact: github-release-webapp
            deploy: false

    linux:
        name: Linux ${{ matrix.arch }}
        needs: prepare-desktop
        strategy:
            fail-fast: false
            matrix:
                arch: [amd64]
        uses: ./.github/workflows/build_desktop_linux.yaml
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            arch: ${{ matrix.arch }}
            sqlcipher: static
            targets: AppImage deb tar.gz
            docker-image-tag: staging

    windows:
        name: Windows ${{ matrix.arch }}
        needs: prepare-desktop
        strategy:
            fail-fast: false
            matrix:
                arch: [x64]
        uses: ./.github/workflows/build_desktop_windows.yaml
        secrets: inherit # zizmor: ignore[secrets-inherit]
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            arch: ${{ matrix.arch }}
            targets: nsis msi
            sign: ${{ vars.WINDOWS_SIGN_RELEASES == 'true' && 'true' || '' }}

    publish:
        name: Publish GitHub release assets
        needs:
            - web
            - linux
            - windows
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  ref: ${{ env.RELEASE_REF }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Download artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  path: downloaded

            - name: Generate release notes
              run: |
                  set -euo pipefail

                  previous_tag="$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"
                  {
                      echo "Automated web, Linux, and Windows client build for ${RELEASE_TAG}."
                      echo
                      if [ -n "$previous_tag" ]; then
                          echo "## Changes since ${previous_tag}"
                          git log --format='- %s (%h)' "${previous_tag}..${RELEASE_TAG}"
                      else
                          echo "## Changes"
                          git log --format='- %s (%h)' "${RELEASE_TAG}" -n 100
                      fi
                  } > RELEASE_NOTES.md

            - name: Collect release assets
              run: |
                  set -euo pipefail

                  mkdir -p release-assets
                  while IFS= read -r -d '' file; do
                      target="release-assets/$(basename "$file")"
                      if [ -e "$target" ]; then
                          echo "::error::Duplicate release asset name: $(basename "$file")"
                          exit 1
                      fi
                      cp "$file" "$target"
                  done < <(
                      find downloaded -type f \
                          \( \
                              -name '*.tar.gz' \
                              -o -name '*.deb' \
                              -o -name '*.AppImage' \
                              -o -name '*.exe' \
                              -o -name '*.msi' \
                              -o -name '*.blockmap' \
                              -o -name 'latest*.yml' \
                          \) \
                          ! -path '*-test/*' \
                          -print0
                  )

                  test "$(find release-assets -type f | wc -l)" -gt 0
                  find release-assets -type f -maxdepth 1 -print | sort

            - name: Upload collected release assets
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: release-assets-${{ env.RELEASE_TAG }}
                  path: release-assets
                  retention-days: 14

            - name: Create or update GitHub release
              run: |
                  set -euo pipefail

                  if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                      gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --notes-file RELEASE_NOTES.md
                      if ! gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"; then
                          echo "::error::GitHub denied release asset upload. Enable Settings > Actions > General > Workflow permissions > Read and write permissions, or add a RELEASE_TOKEN secret with Contents: read/write."
                          exit 1
                      fi
                  else
                      if ! gh release create "$RELEASE_TAG" release-assets/* \
                          --repo "$GITHUB_REPOSITORY" \
                          --target "$RELEASE_TAG" \
                          --title "$RELEASE_TAG" \
                          --notes-file RELEASE_NOTES.md; then
                          echo "::error::GitHub denied release creation. Enable Settings > Actions > General > Workflow permissions > Read and write permissions, or add a RELEASE_TOKEN secret with Contents: read/write."
                          exit 1
                      fi
                  fi
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
