name: GitHub Release Clients

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build and publish, for example v1.12.21"
                required: true
                type: string

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
    contents: read

env:
    RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    DESKTOP_CONFIG: github-release
    WEBAPP_ARTIFACT: github-release-webapp

jobs:
    web:
        name: Build web
        runs-on: ubuntu-24.04
        outputs:
            version: ${{ steps.release-version.outputs.version }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  ref: ${{ env.RELEASE_REF }}
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version-file: .node-version
                  cache: pnpm

            - name: Validate release version
              id: release-version
              run: |
                  set -euo pipefail
                  version="$(node scripts/validate-release-version.mjs "$RELEASE_TAG")"
                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Install dependencies
              run: ./scripts/layered.sh

            - name: Build web distribution
              working-directory: apps/web
              run: pnpm run dist
              env:
                  DIST_VERSION: ${{ steps.release-version.outputs.version }}
                  CI_PACKAGE: true

            - name: Upload webapp for desktop packaging
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ${{ env.WEBAPP_ARTIFACT }}
                  path: apps/web/webapp
                  retention-days: 1

            - name: Upload web release tarball
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: web-release
                  path: apps/web/dist/*.tar.gz
                  retention-days: 1

    prepare-desktop:
        name: Prepare desktop
        needs: web
        uses: ./.github/workflows/build_desktop_prepare.yaml
        permissions:
            contents: read
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            config: github-release
            version: develop
            webapp-artifact: github-release-webapp
            deploy: false

    linux:
        name: Linux ${{ matrix.arch }}
        needs:
            - web
            - prepare-desktop
        strategy:
            fail-fast: false
            matrix:
                arch: [amd64]
        uses: ./.github/workflows/build_desktop_linux.yaml
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            arch: ${{ matrix.arch }}
            sqlcipher: static
            targets: AppImage deb tar.gz
            version: ${{ needs.web.outputs.version }}
            docker-image-tag: staging
            update-manifest-public-key-pem: ${{ vars.UPDATE_MANIFEST_PUBLIC_KEY_PEM }}
            update-manifest-public-key-base64: ${{ vars.UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
            update-manifest-public-keys-json: ${{ vars.UPDATE_MANIFEST_PUBLIC_KEYS_JSON }}
            update-manifest-public-keys-base64-json: ${{ vars.UPDATE_MANIFEST_PUBLIC_KEYS_BASE64_JSON }}
            update-manifest-key-id: ${{ vars.UPDATE_MANIFEST_KEY_ID }}

    windows:
        name: Windows ${{ matrix.arch }}
        needs:
            - web
            - prepare-desktop
        strategy:
            fail-fast: false
            matrix:
                arch: [x64]
        uses: ./.github/workflows/build_desktop_windows.yaml
        secrets: inherit # zizmor: ignore[secrets-inherit]
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
            arch: ${{ matrix.arch }}
            targets: nsis msi
            version: ${{ needs.web.outputs.version }}
            sign: ${{ vars.WINDOWS_SIGN_RELEASES == 'true' && 'true' || '' }}

    publish:
        name: Publish GitHub release assets
        needs:
            - web
            - linux
            - windows
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  ref: ${{ env.RELEASE_REF }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Download artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  path: downloaded

            - name: Generate release notes
              run: |
                  set -euo pipefail

                  node scripts/validate-release-version.mjs "$RELEASE_TAG"

                  previous_tag="$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"

                  # Detect an upstream-sync merge in this release's range so the notes can
                  # lead with a clear "synced with upstream" callout (see AGENTS.md). Matches
                  # the conventional merge subject "Merge upstream/develop ...".
                  sync_merge=""
                  if [ -n "$previous_tag" ]; then
                      sync_merge="$(git log --merges --format='%H %s' "${previous_tag}..${RELEASE_TAG}" | grep -iE 'merge upstream/develop' | head -n 1 | cut -d' ' -f1 || true)"
                  fi

                  {
                      echo "Automated web, Linux, and Windows client build for ${RELEASE_TAG}."
                      echo
                      if [ -n "$sync_merge" ]; then
                          up_sha="$(git rev-parse --short "${sync_merge}^2")"
                          up_date="$(git log -1 --format=%cs "${sync_merge}^2")"
                          up_count="$(git rev-list --count "${sync_merge}^1..${sync_merge}^2")"
                          echo "🔄 **Synced with upstream:** merged ${up_count} commits from element-hq/element-web \`develop\` up to \`${up_sha}\` (${up_date}). This build is up to date with upstream (official Element) plus our custom enhancements — upstream + ours."
                          echo
                      fi
                      if [ -n "$previous_tag" ]; then
                          echo "## Changes since ${previous_tag}"
                          git log --format='- %s (%h)' "${previous_tag}..${RELEASE_TAG}"
                      else
                          echo "## Changes"
                          git log --format='- %s (%h)' "${RELEASE_TAG}" -n 100
                      fi
                  } > RELEASE_NOTES.md

            - name: Collect release assets
              run: |
                  set -euo pipefail

                  mkdir -p release-assets
                  while IFS= read -r -d '' file; do
                      filename="$(basename "$file")"
                      # upload/download-artifact can prefix filenames with the source artifact name,
                      # for example linux-amd64-sqlcipher-static__element-desktop-1.12.27-linux-x64.tar.gz.
                      # GitHub release assets need their canonical electron-builder names because
                      # the runtime updater constructs deterministic download URLs.
                      filename="${filename#linux-amd64-sqlcipher-static__}"
                      filename="${filename#linux-arm64-sqlcipher-static__}"
                      filename="${filename#win-x64__}"
                      filename="${filename#win-arm64__}"
                      filename="${filename#web-release__}"
                      target="release-assets/$filename"
                      if [ -e "$target" ]; then
                          echo "::error::Duplicate release asset name after normalization: $filename"
                          exit 1
                      fi
                      cp "$file" "$target"
                  done < <(
                      find downloaded -type f \
                          \( \
                              -name '*.tar.gz' \
                              -o -name '*.deb' \
                              -o -name '*.AppImage' \
                              -o -name '*.exe' \
                              -o -name '*.msi' \
                              -o -name '*.blockmap' \
                              -o -name 'latest*.yml' \
                          \) \
                          ! -path '*-test/*' \
                          -print0
                  )

                  test "$(find release-assets -type f | wc -l)" -gt 0
                  find release-assets -type f -maxdepth 1 -print | sort

                  version="$(node scripts/validate-release-version.mjs "$RELEASE_TAG")"
                  test -f "release-assets/element-desktop-${version}-linux-x64.tar.gz"

            - name: Sign Linux tar.gz update manifests
              run: node scripts/sign-linux-tarball-update-manifests.mjs --assets-dir release-assets --release-tag "$RELEASE_TAG" --repository "$GITHUB_REPOSITORY"
              env:
                  UPDATE_MANIFEST_PRIVATE_KEY_PEM: ${{ secrets.UPDATE_MANIFEST_PRIVATE_KEY_PEM }}
                  UPDATE_MANIFEST_PRIVATE_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PRIVATE_KEY_BASE64 }}
                  UPDATE_MANIFEST_KEY_ID: ${{ vars.UPDATE_MANIFEST_KEY_ID }}

            - name: Upload collected release assets
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: release-assets-${{ env.RELEASE_TAG }}
                  path: release-assets
                  retention-days: 14

            - name: Create immutable GitHub release
              run: |
                  set -euo pipefail

                  if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                      echo "::error::Release $RELEASE_TAG already exists. Releases are immutable; create a new tag/version instead."
                      exit 1
                  fi

                  # Semver prerelease tags (anything with a hyphen, e.g. v1.12.40-pre.1) are
                  # published as GitHub prereleases so the runtime updater — which fetches
                  # releases/latest and skips draft/prerelease — does NOT offer them as an
                  # automatic update. They still build full client artifacts for manual testing.
                  prerelease_flag=""
                  case "$RELEASE_TAG" in
                      *-*) prerelease_flag="--prerelease" ;;
                  esac

                  if ! gh release create "$RELEASE_TAG" release-assets/* \
                      --repo "$GITHUB_REPOSITORY" \
                      --verify-tag \
                      --title "$RELEASE_TAG" \
                      $prerelease_flag \
                      --notes-file RELEASE_NOTES.md; then
                        echo "::error::GitHub denied release creation. Enable Settings > Actions > General > Workflow permissions > Read and write permissions, or add a RELEASE_TOKEN secret with Contents: read/write."
                        exit 1
                  fi
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
